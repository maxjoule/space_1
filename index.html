<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Space2.2_save_alien?</title>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 10px; overflow: hidden; touch-action: none; user-select: none; }
        canvas { image-rendering: pixelated; border: 6px solid #333; display: block; margin: 10px auto; background-color: #000814; }
        .info-panel { font-size: 18px; color: #FFD700; height: 30px; margin-bottom: 5px; }
        #quiz-overlay { 
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95); border: 4px solid #FFD700; padding: 20px; width: 400px; z-index: 100;
        }
       #quiz-overlay h3 {
    color: #FFD700;
    margin-top: 0;
    font-size: 28px;
    line-height: 1.6;
}
        #quiz-overlay input { width: 80%; padding: 10px; margin: 10px 0; border: none; font-size: 16px; }
        #quiz-overlay button { padding: 10px 20px; background: #28a745; color: white; border: none; cursor: pointer; font-size: 16px; }
        #quiz-overlay button:hover { background: #218838; }
	#optionsBox button {
    display: block;
    width: 80%;
    margin: 6px auto;     /* 原来是8px → 变小 */
    padding: 6px 10px;      /* 原来是12px → 变小 */
    font-size: 14px;   /* 原来16px → 变小 */

    background: #1f6f3f;
    color: #fff;

    border: 2px solid #2ecc71;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.2s;
}
#optionsBox button:hover {
    background: #2ecc71;
    transform: scale(1.03);
}

#optionsBox button:hover {
    background: #444;
}

#questionText {
    font-size: 28px !important;
    line-height: 1.6;
    color: #FFD700;
    font-weight: bold;
}    
        #mobileControls {
            display: none;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 12px;
            z-index: 300;
            pointer-events: none;
        }

        .mobile-left,
        .mobile-right {
            position: absolute;
            bottom: 0;
            display: flex;
            gap: 14px;
            pointer-events: auto;
        }

        .mobile-left {
            left: 18px;
        }

        .mobile-right {
            right: 18px;
        }

        #mobileControls button {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: 3px solid #FFD700;
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            font-weight: bold;
            font-size: 15px;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 10px rgba(255,215,0,0.4);
            touch-action: none;
        }

        #mobileControls button:active {
            background: rgba(255, 215, 0, 0.35);
            transform: scale(0.96);
        }

        @media (max-width: 900px), (pointer: coarse) {
            body {
                padding: 4px;
            }

            canvas {
                width: 100vw !important;
                max-width: 100vw;
                height: auto !important;
                margin-top: 4px;
                border-width: 4px;
            }

            .info-panel {
                font-size: 14px;
                height: auto;
            }

            #mobileControls {
                display: block;
                height: 90px;
            }

            p {
                display: none;
            }

            #quiz-overlay {
                width: 88vw;
                max-width: 420px;
            }
        }

    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="info-panel">
    <span id="levelDisplay">LEVEL: 1</span> |
    <span id="timeDisplay">TIME: 0</span> |
    <span id="msg">准备战斗！</span>
</div>
    <canvas id="gameCanvas" width="400" height="240"></canvas>
    <div id="quiz-overlay">
    <h3 id="questionText">问题加载中...</h3>

    <div id="optionsBox"></div>

    <p id="quizFeedback" style="color: red; font-size: 12px;"></p>
</div>

    <div id="mobileControls">
        <div class="mobile-left">
            <button id="btnLeft">◀</button>
            <button id="btnRight">▶</button>
        </div>
        <div class="mobile-right">
            <button id="btnJump">JUMP</button>
            <button id="btnShoot">FIRE</button>
        </div>
    </div>

    <p style="color:#aaa; font-size:12px;">W(跳) | A D(左右) | 空格(射击) | 第6关：双Boss同时登场！</p>

<script>
/*
    Space2.2 - Balanced Speed Version

    Main changes:
    - Slower but more responsive player movement
    - Smooth acceleration and friction
    - Low-gravity astronaut jump
    - Slower bullets
    - Floating descent with capped fall speed
    - Slower enemies
    - Slower boss chase
    - Slower laser boss timing
    - Smooth camera follow

    You can adjust gameplay using the constants near the top:
    PLAYER_WALK_SPEED, PLAYER_RUN_SPEED, GRAVITY, JUMP_POWER, etc.
*/
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.style.width = '800px'; canvas.style.height = '480px';

    // 天文选择题库（4选1）
const storyQuizzes = [
    {
        q: "地球唯一的天然卫星是？",
        options: ["A. 火星", "B. 月球", "C. 金星", "D. 木星"],
        a: "b"
    },
    {
        q: "太阳系中拥有著名光环的是哪颗行星？",
        options: ["A. 地球", "B. 火星", "C. 土星", "D. 水星"],
        a: "c"
    },
    {
        q: "一天中我们看到太阳升起的方向是？",
        options: ["A. 东边", "B. 西边", "C. 南边", "D. 北边"],
        a: "a"
    },
    {
        q: "夜空中最亮的天然天体是？",
        options: ["A. 金星", "B. 北极星", "C. 月球", "D. 木星"],
        a: "c"
    },
    {
        q: "太阳表面的平均温度大约是多少？",
        options: ["A. 600℃", "B. 6000℃", "C. 60000℃", "D. 60℃"],
        a: "b"
    },
    {
        q: "第一位进入太空的人是谁？",
        options: ["A. 尼尔·阿姆斯特朗", "B. 杨利伟", "C. 尤里·加加林", "D. 艾伦·谢泼德"],
        a: "c"
    }
];
    let gameState = 'playing'; let level = 1; let keys = {}; let cameraX = 0; let WORLD_WIDTH = 2000;
    let player, platforms, enemies, bullets, goal, boss, laserEnemy, levelTimer = 0;

// Gameplay tuning - adjust these values anytime
const PLAYER_WALK_SPEED = 1.15;
const PLAYER_RUN_SPEED  = 1.75;
const PLAYER_ACCEL      = 0.24;
const PLAYER_FRICTION   = 0.68;
const GRAVITY           = 0.06;
const JUMP_POWER        = -4.3;
const DOUBLE_JUMP_POWER = -4.0;
const MAX_FALL_SPEED   = 2.2;
const BULLET_SPEED      = 6;
const CAMERA_SMOOTHING  = 0.08;
const BOSS_FAST_SPEED   = 1.1;
const BOSS_SLOW_SPEED   = 0.7;
let levelStartX = 50;
let levelStartY = 150;
let winTimer = 0;
function getGroundColor(level) {
    const colors = [
        { top: '#999999', bottom: '#555555' }, // 1 灰
        { top: '#ff6666', bottom: '#992222' }, // 2 红
        { top: '#ff9900', bottom: '#cc6600' }, // 3 橙
        { top: '#d2b48c', bottom: '#8b5a2b' }, // 4 浅褐
        { top: '#66cccc', bottom: '#226666' }, // 5 青
        { top: '#6699ff', bottom: '#224488' }  // 6 蓝
    ];
    return colors[(level - 1) % 6];
}
function getEnemyColor(level) {
    const colors = [
        { body: '#00FF66', head: '#66FF99' }, // 1 绿
        { body: '#FFD700', head: '#FFA500' }, // 2 黄
        { body: '#FF69B4', head: '#FFB6C1' }  // 3 粉
    ];
    return colors[(level - 1) % 3];
}	
    function initLevel() {
        player = { x: 50, y: 150, w: 14, h: 18, velX: 0, velY: 0, grounded: false, dir: 1, jumps: 0 };
	levelStartX = 50;
levelStartY = 150;
        cameraX = 0; bullets = []; gameState = 'playing'; levelTimer = 0;
winTimer = 0;
        document.getElementById('quiz-overlay').style.display = 'none';
        document.getElementById('levelDisplay').innerText = `LEVEL: ${level}`;
        
        WORLD_WIDTH = 2000;
        platforms = [{ x: 0, y: 200, w: 300, h: 40 }]; 
        let currentX = 350;
        while (currentX < WORLD_WIDTH - 300) {
            platforms.push({ x: currentX, y: 180 - (currentX % 400 === 0 ? 40 : 0), w: 120, h: 12 });
            currentX += 260;
        }
        platforms.push({ x: WORLD_WIDTH - 300, y: 200, w: 300, h: 40 });
        goal = {
    x: WORLD_WIDTH - 90,
    y: 150,   // 👈 地面高度
    w: 30,
    h: 50
};

        // 1-3关怪物：放在玩家必经的平台上
        enemies = [];
        if (level <= 3) {
            platforms.forEach((p, i) => {
                if (i > 0 && i < platforms.length - 1) {
                    enemies.push({ x: p.x + 20, y: p.y - 16, w: 16, h: 16, speed: 0.25 + level*0.08, range: p.w - 40, startX: p.x + 20, dir: 1 });
                }
            });
        }

        // 第4-6关 Boss 初始化
        boss = {
    active: (level === 4 || level === 6),
    x: cameraX - 200,   // 👈 从玩家后面出现
    y: 150,
    w: 35,
    h: 35,
    hp: 50,
    maxHp: 50,
    flash: 0
};
        laserEnemy = { active: (level === 5 || level === 6), x: WORLD_WIDTH - 500, y: 150, w: 45, h: 45, hp: 50, maxHp: 50, timer: 0, isWarning: false, isFiring: false, flash: 0 };
    }

    function playerJump() {
        if(gameState !== 'playing') return;

        if(player.grounded) {
            player.velY = JUMP_POWER;
            player.grounded = false;
            player.jumps = 1;
        }
        else if(player.jumps < 2) {
            player.velY = DOUBLE_JUMP_POWER;
            player.jumps = 2;
        }
    }

    function playerShoot() {
        if(gameState !== 'playing') return;

        bullets.push({
            x: player.x + (player.dir === 1 ? player.w : -12),
            y: player.y + 8,
            w: 14,
            h: 3,
            vx: BULLET_SPEED * player.dir
        });
    }

    window.addEventListener('keydown', e => {
        if(e.code === "Space") e.preventDefault();

        // Prevent repeated auto-fire/jump while holding the key
        if(keys[e.code]) return;

        keys[e.code] = true;

        if(e.code === 'KeyW') playerJump();
        if(e.code === 'Space') playerShoot();
    });

    window.addEventListener('keyup', e => {
        keys[e.code] = false;
    });


    function bindTouchButton(buttonId, keyCode, action) {
        const btn = document.getElementById(buttonId);
        if(!btn) return;

        const start = function(e) {
            e.preventDefault();
            keys[keyCode] = true;

            if(action === 'jump') playerJump();
            if(action === 'shoot') playerShoot();
        };

        const end = function(e) {
            e.preventDefault();
            keys[keyCode] = false;
        };

        btn.addEventListener('touchstart', start, { passive: false });
        btn.addEventListener('touchend', end, { passive: false });
        btn.addEventListener('touchcancel', end, { passive: false });

        // Also support mouse testing in desktop browser
        btn.addEventListener('mousedown', start);
        btn.addEventListener('mouseup', end);
        btn.addEventListener('mouseleave', end);
    }

    bindTouchButton("btnLeft", "KeyA", "move");
    bindTouchButton("btnRight", "KeyD", "move");
    bindTouchButton("btnJump", "KeyW", "jump");
    bindTouchButton("btnShoot", "Space", "shoot");

    // Stop Android browser from scrolling/zooming while playing
    document.addEventListener("touchmove", function(e) {
        if(gameState === "playing") e.preventDefault();
    }, { passive: false });

    function update() {
    if(gameState !== 'playing') return;
	levelTimer++;

document.getElementById("timeDisplay").innerText =
    "TIME: " + (levelTimer / 60).toFixed(1);

        // Smooth player movement
        let maxSpeed = keys['ShiftLeft'] ? PLAYER_RUN_SPEED : PLAYER_WALK_SPEED;

        if(keys['KeyA']) {
            player.velX -= PLAYER_ACCEL;
            if(player.velX < -maxSpeed) player.velX = -maxSpeed;
            player.dir = -1;
        }
        else if(keys['KeyD']) {
            player.velX += PLAYER_ACCEL;
            if(player.velX > maxSpeed) player.velX = maxSpeed;
            player.dir = 1;
        }
        else {
            player.velX *= PLAYER_FRICTION;
            if(Math.abs(player.velX) < 0.05) player.velX = 0;
        }

        // Low-gravity astronaut jump
        player.velY += GRAVITY;

        // Slow floating descent
        if(player.velY > MAX_FALL_SPEED) {
            player.velY = MAX_FALL_SPEED;
        }

        player.x += player.velX;
        player.y += player.velY;

        // Smooth camera follow
        let targetCamera = player.x - canvas.width / 2;
        targetCamera = Math.max(0, Math.min(targetCamera, WORLD_WIDTH - canvas.width));
        cameraX += (targetCamera - cameraX) * CAMERA_SMOOTHING;
        player.grounded = false;
        platforms.forEach(p => { if(colCheck(player, p) && player.velY > 0 && player.y < p.y + 12) { player.grounded=true; player.jumps=0; player.velY=0; player.y=p.y-player.h; }});

        // Boss 追逐逻辑 (Level 4 & 6)
if(boss.active) {

    if (levelTimer > 60) {

        // 到终点前200像素停止
        let stopX = WORLD_WIDTH - 250;

        if(boss.x < stopX){

            if (boss.x < player.x - 200) {
                boss.x += BOSS_FAST_SPEED;
            } else {
                boss.x += BOSS_SLOW_SPEED;
            }

            // 防止超出停止位置
            if(boss.x > stopX){
                boss.x = stopX;
            }
        }

        if(colCheck(player, boss))
            triggerDie();
    }
}

        // Boss 狙击逻辑 (Level 5 & 6)
        if(laserEnemy.active) {
            laserEnemy.timer++; if(laserEnemy.flash > 0) laserEnemy.flash--;

            // Slower laser timing: longer warning, easier reaction
            laserEnemy.isWarning = (laserEnemy.timer > 120 && laserEnemy.timer < 200);
            laserEnemy.isFiring = (laserEnemy.timer >= 200 && laserEnemy.timer < 240);

            if(laserEnemy.timer >= 240) laserEnemy.timer = 0;
	    // 碰到紫色Boss直接死亡
	    if(laserEnemy.active && colCheck(player, laserEnemy)) {
    triggerDie();
}            
	    if(
    laserEnemy.isFiring &&
    player.x < laserEnemy.x &&
    player.y + player.h > laserEnemy.y + 10 &&
    player.y < laserEnemy.y + 40
){
    triggerDie();
}
}
        bullets.forEach((b, bi) => {
            b.x += b.vx;
            enemies.forEach((e, ei) => { if(colCheck(b, e)) { enemies.splice(ei, 1); bullets.splice(bi, 1); }});
            if(boss.active && colCheck(b, boss)) { boss.hp--; boss.flash=5; bullets.splice(bi, 1); if(boss.hp<=0) boss.active=false; }
            if(laserEnemy.active && colCheck(b, laserEnemy)) { laserEnemy.hp--; laserEnemy.flash=5; bullets.splice(bi, 1); if(laserEnemy.hp<=0) laserEnemy.active=false; }
            if(b.x < cameraX || b.x > cameraX + 450) bullets.splice(bi, 1);
        });

        enemies.forEach(e => { e.x += e.speed*e.dir; if(Math.abs(e.x-e.startX)>e.range) e.dir*=-1; if(colCheck(player,e)) triggerDie(); });
        if(player.y > canvas.height) triggerDie();
	if(colCheck(player, goal)) {

    if(level === 4 && boss.active){
        document.getElementById("msg").innerText =
            "必须消灭追击Boss才能通关！";
        return;
    }

    if(level === 5 && laserEnemy.active){
        document.getElementById("msg").innerText =
            "必须消灭激光Boss才能通关！";
        return;
    }

    if(level === 6 && (boss.active || laserEnemy.active)){
        document.getElementById("msg").innerText =
            "必须消灭所有Boss才能通关！";
        return;
    }

    showQuiz();
    gameState = 'quiz';
}
	        
        // 到达终点 -> 开启答题
        if(gameState === 'win') {
    winTimer++;

    let baseY = goal.y + goal.h;

    goal.y -= 2;

    player.x += (goal.x - player.x) * 0.1;
    player.y += (goal.y - player.y) * 0.1;

    if(winTimer > 120) {
        level++;
        if(level > 6) level = 1;
        initLevel();
    }
	return;
}
    }

    function showQuiz() {
    const quiz = storyQuizzes[(level - 1) % storyQuizzes.length];

    document.getElementById('quiz-overlay').style.display = 'block';

    document.getElementById('questionText').innerText = quiz.q;

    const box = document.getElementById('optionsBox');
    box.innerHTML = "";

    quiz.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.innerText = opt;

        btn.onclick = () => {
            handleAnswer(opt, quiz);
        };

        box.appendChild(btn);
    });

    document.getElementById('quizFeedback').innerText = "";
}

    function colCheck(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }
    function triggerDie() { gameState='gameOver'; setTimeout(initLevel, 800); }

    function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // 星空背景
    for(let i=0;i<120;i++){

    let alpha = 0.4 + 0.6 *
        Math.abs(Math.sin(Date.now()/500 + i));

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;

    ctx.fillRect(
        (i*97)%WORLD_WIDTH,
        (i*43)%180,
        2,
        2
    );
}

    platforms.forEach(p => {
        ctx.fillStyle='#666666';
        ctx.fillRect(p.x, p.y, p.w, p.h);

        ctx.fillStyle='#00FFFF';
        ctx.fillRect(p.x, p.y, p.w, 4);
    });
        let ground = getGroundColor(level);

platforms.forEach(p => {

    // 下层（地面主体）
    ctx.fillStyle = ground.bottom;
    ctx.fillRect(p.x, p.y, p.w, p.h);

    // 上层（边缘高亮）
    ctx.fillStyle = ground.top;
    ctx.fillRect(p.x, p.y, p.w, 4);
});
        bullets.forEach(b => { ctx.fillStyle='#FFD700'; ctx.fillRect(b.x, b.y, b.w, b.h); });
        if(boss.active) {

    // 飞碟底盤
    ctx.fillStyle = boss.flash > 0 ? 'white' : '#A0FFA0';

    ctx.beginPath();
    ctx.ellipse(
        boss.x + boss.w/2,
        boss.y + 22,
        24,
        10,
        0,
        0,
        Math.PI * 2
    );
    ctx.fill();

    // 玻璃罩
    ctx.fillStyle = '#87CEFA';

    ctx.beginPath();
    ctx.ellipse(
        boss.x + boss.w/2,
        boss.y + 15,
        12,
        10,
        0,
        Math.PI,
        Math.PI * 2
    );
    ctx.fill();

    // 紫色外星人头
    ctx.fillStyle = '#AA00FF';

    ctx.beginPath();
    ctx.arc(
        boss.x + boss.w/2,
        boss.y + 14,
        6,
        0,
        Math.PI * 2
    );
    ctx.fill();

    // 眼睛
    ctx.fillStyle = 'black';
    ctx.fillRect(boss.x + 15, boss.y + 12, 2, 2);
    ctx.fillRect(boss.x + 19, boss.y + 12, 2, 2);

    // 触角
    ctx.strokeStyle = '#AA00FF';
    ctx.lineWidth = 1;

    ctx.beginPath();
    ctx.moveTo(boss.x + 17, boss.y + 8);
    ctx.lineTo(boss.x + 15, boss.y + 4);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(boss.x + 19, boss.y + 8);
    ctx.lineTo(boss.x + 21, boss.y + 4);
    ctx.stroke();

    // 飞碟发光
    ctx.fillStyle = 'rgba(0,255,255,0.5)';

    ctx.beginPath();
    ctx.ellipse(
        boss.x + boss.w/2,
        boss.y + 28,
        18,
        4,
        0,
        0,
        Math.PI * 2
    );
    ctx.fill();

    // 血条
    ctx.fillStyle='red';
    ctx.fillRect(boss.x, boss.y-8, boss.w, 3);

    ctx.fillStyle='lime';
    ctx.fillRect(
        boss.x,
        boss.y-8,
        (boss.hp/boss.maxHp)*boss.w,
        3
    );
}
        if(laserEnemy.active) {
            // 紫色精英外星人
ctx.fillStyle = laserEnemy.flash > 0 ? 'white' : '#AA00FF';

// 身体
ctx.fillRect(laserEnemy.x+6, laserEnemy.y+12, 33, 22);

// 大脑袋
ctx.fillStyle = laserEnemy.flash > 0 ? 'white' : '#CC66FF';
ctx.fillRect(laserEnemy.x+3, laserEnemy.y, 39, 18);

// 大眼睛
ctx.fillStyle = '#000';
ctx.fillRect(laserEnemy.x+10, laserEnemy.y+5, 5, 5);
ctx.fillRect(laserEnemy.x+30, laserEnemy.y+5, 5, 5);

// 发光瞳孔
ctx.fillStyle = '#FF0000';
ctx.fillRect(laserEnemy.x+11, laserEnemy.y+6, 2, 2);
ctx.fillRect(laserEnemy.x+31, laserEnemy.y+6, 2, 2);

// 触角
ctx.fillStyle = '#AA00FF';
ctx.fillRect(laserEnemy.x+10, laserEnemy.y-6, 2, 6);
ctx.fillRect(laserEnemy.x+32, laserEnemy.y-6, 2, 6);

// 手臂
ctx.fillRect(laserEnemy.x, laserEnemy.y+18, 6, 3);
ctx.fillRect(laserEnemy.x+39, laserEnemy.y+18, 6, 3);
            ctx.fillStyle='red'; ctx.fillRect(laserEnemy.x, laserEnemy.y-10, laserEnemy.w, 3);
            ctx.fillStyle='lime'; ctx.fillRect(laserEnemy.x, laserEnemy.y-10, (laserEnemy.hp/50)*laserEnemy.w, 3);
            if(laserEnemy.isWarning) { ctx.strokeStyle='white'; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(cameraX, laserEnemy.y+22); ctx.lineTo(laserEnemy.x, laserEnemy.y+22); ctx.stroke(); ctx.setLineDash([]);}
            if(laserEnemy.isFiring) {
    ctx.fillStyle='rgba(255,50,50,0.7)';

    ctx.fillRect(
        cameraX,
        laserEnemy.y + 12,
        laserEnemy.x - cameraX,
        20
    );
}
}
        // 外星人
enemies.forEach(e => {

    let c = getEnemyColor(level);

    // 身体
    ctx.fillStyle = c.body;
    ctx.fillRect(e.x+2, e.y+4, 12, 10);

    // 大脑袋
    ctx.fillStyle = c.head;
    ctx.fillRect(e.x, e.y, 16, 8);

    // 眼睛
    ctx.fillStyle = '#000';
    ctx.fillRect(e.x+3, e.y+2, 2, 2);
    ctx.fillRect(e.x+11, e.y+2, 2, 2);

    // 触角
    ctx.fillStyle = c.body;
    ctx.fillRect(e.x+4, e.y-3, 1, 3);
    ctx.fillRect(e.x+11, e.y-3, 1, 3);
});
        // 火箭底部贴地基准
let x = goal.x;
let baseY = goal.y + goal.h; // 👈 地面

// 火箭主体
ctx.fillStyle = '#E0E0E0';
ctx.fillRect(goal.x+6, baseY-28, 18, 28);

// 火箭头
ctx.fillStyle = '#FF4444';

ctx.beginPath();
ctx.moveTo(goal.x+15, baseY-45);
ctx.lineTo(goal.x+6, baseY-28);
ctx.lineTo(goal.x+24, baseY-28);
ctx.fill();

// 窗户
ctx.fillStyle = '#87CEFA';
ctx.beginPath();
ctx.arc(goal.x+15, baseY-18, 4, 0, Math.PI*2);
ctx.fill();

// 左翼
ctx.fillStyle = '#FF4444';
ctx.fillRect(goal.x, baseY-15, 6, 12);

// 右翼
ctx.fillRect(goal.x+24, baseY-15, 6, 12);

// 火焰动画
let flame = 4 + Math.floor(Math.sin(Date.now()/100)*3);

ctx.fillStyle = '#FF6600';
ctx.fillRect(goal.x+10, baseY, 4, flame);

ctx.fillStyle = '#FFFF00';
ctx.fillRect(goal.x+16, baseY, 4, flame-1);
      
 // 太空人
ctx.fillStyle = '#FFFFFF'; // 头盔
ctx.fillRect(player.x, player.y, 14, 12);

ctx.fillStyle = '#87CEFA'; // 面罩
ctx.fillRect(player.x+3, player.y+3, 8, 5);

ctx.fillStyle = '#E0E0E0'; // 太空服身体
ctx.fillRect(player.x+2, player.y+12, 10, 6);

ctx.fillStyle = '#FFD700'; // 氧气背包
ctx.fillRect(player.x+1, player.y+12, 3, 5);
        ctx.restore();
    }

    function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

function handleAnswer(selected, quiz) {

    const isCorrect = selected.startsWith(quiz.a.toUpperCase());

    if (isCorrect) {
        document.getElementById('quizFeedback').style.color = "lime";
        document.getElementById('quizFeedback').innerText = "答对了！";

        setTimeout(() => {
            level++;
            gameState = 'playing';
            document.getElementById('quiz-overlay').style.display = 'none';

            if (level > 6) {
                alert("恭喜通关所有关卡！");
                level = 1;
            }

            initLevel();
        }, 1000);

    } else {
        document.getElementById('quizFeedback').style.color = "red";
        document.getElementById('quizFeedback').innerText = "答错了！返回本关起点";

        setTimeout(() => {
            initLevel();
            gameState = 'playing';
            document.getElementById('quiz-overlay').style.display = 'none';
        }, 1000);
    }
}

initLevel();
loop();
</script>
